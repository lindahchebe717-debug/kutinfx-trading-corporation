<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Trading - KutinFX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000;
        }
        .mt5-card { 
            background: #1e222d; 
            border: 1px solid #2a2e39;
        }
        .buy-btn { background: #26a69a; }
        .sell-btn { background: #ef5350; }
        .grid-line { stroke: #2a2e39; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e222d; }
        ::-webkit-scrollbar-thumb { background: #363a45; border-radius: 3px; }
    </style>
</head>
<body class="text-white h-screen overflow-hidden flex flex-col">
    <!-- Top Bar -->
    <div class="mt5-card border-b border-slate-700 px-3 py-2 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button class="p-2 hover:bg-slate-700 rounded">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <div class="flex items-center gap-2 bg-slate-800 rounded px-3 py-1.5">
                <span class="font-bold text-sm" id="symbol">XAUUSD</span>
                <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
            <div class="flex items-center gap-1 bg-slate-800 rounded px-2 py-1">
                <button class="px-2 py-1 text-xs hover:bg-slate-700 rounded">M1</button>
                <button class="px-2 py-1 text-xs hover:bg-slate-700 rounded">M5</button>
                <button class="px-2 py-1 text-xs bg-blue-600 rounded">M15</button>
                <button class="px-2 py-1 text-xs hover:bg-slate-700 rounded">H1</button>
                <button class="px-2 py-1 text-xs hover:bg-slate-700 rounded">H4</button>
                <button class="px-2 py-1 text-xs hover:bg-slate-700 rounded">D1</button>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button class="p-2 hover:bg-slate-700 rounded">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </button>
            <button class="p-2 hover:bg-slate-700 rounded">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            </button>
        </div>
    </div>

    <!-- Price Header -->
    <div class="bg-slate-900 border-b border-slate-700 px-3 py-2">
        <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-4">
                <div>
                    <p class="text-xs text-slate-400">SELL</p>
                    <p class="text-xl font-bold text-red-500" id="sellPrice">4156.47</p>
                </div>
                <div class="text-slate-600">|</div>
                <div>
                    <p class="text-xs text-slate-400">BUY</p>
                    <p class="text-xl font-bold text-green-500" id="buyPrice">4156.64</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button class="px-3 py-1 text-xs bg-slate-800 rounded hover:bg-slate-700">0.1</button>
                <button class="px-3 py-1 text-xs bg-slate-800 rounded hover:bg-slate-700">0.3</button>
                <button class="px-3 py-1 text-xs bg-blue-600 rounded">0.5</button>
                <button class="px-3 py-1 text-xs bg-slate-800 rounded hover:bg-slate-700">1.0</button>
            </div>
        </div>
    </div>

    <!-- Chart Container -->
    <div class="flex-1 relative">
        <div id="tradingview_chart" class="w-full h-full"></div>
        
        <!-- Current Price Label -->
        <div class="absolute right-0 top-1/2 transform -translate-y-1/2 bg-green-600 text-white text-xs px-2 py-1 rounded-l">
            <div id="currentPrice">4156.42</div>
            <div class="text-[10px] text-green-200" id="priceTime">04:56</div>
        </div>
    </div>

    <!-- Trading Panel -->
    <div class="mt5-card border-t border-slate-700 p-3">
        <div class="grid grid-cols-2 gap-3 mb-3">
            <button onclick="openTrade('SELL')" class="sell-btn hover:bg-red-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>
                <div class="text-left">
                    <div class="text-xs opacity-80">SELL</div>
                    <div class="text-lg" id="sellBtnPrice">4156.47</div>
                </div>
            </button>
            
            <button onclick="openTrade('BUY')" class="buy-btn hover:bg-green-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all">
                <div class="text-right">
                    <div class="text-xs opacity-80">BUY</div>
                    <div class="text-lg" id="buyBtnPrice">4156.64</div>
                </div>
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
            </button>
        </div>
        
        <!-- Trade Info -->
        <div class="grid grid-cols-3 gap-3 text-xs">
            <div class="bg-slate-800 rounded-lg p-2">
                <p class="text-slate-400 mb-1">Spread</p>
                <p class="font-semibold" id="spread">0.17</p>
            </div>
            <div class="bg-slate-800 rounded-lg p-2">
                <p class="text-slate-400 mb-1">Margin</p>
                <p class="font-semibold">$<span id="margin">0.00</span></p>
            </div>
            <div class="bg-slate-800 rounded-lg p-2">
                <p class="text-slate-400 mb-1">Balance</p>
                <p class="font-semibold">$<span id="balance">8292.99</span></p>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="mt5-card border-t border-slate-700 px-2 py-2">
        <div class="flex items-center justify-around">
            <button class="flex flex-col items-center gap-1 p-2 text-slate-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
                <span class="text-[10px]">Quotes</span>
            </button>
            <button class="flex flex-col items-center gap-1 p-2 text-blue-500 bg-blue-500/10 rounded-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                <span class="text-[10px]">Charts</span>
            </button>
            <button class="flex flex-col items-center gap-1 p-2 text-slate-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                <span class="text-[10px]">Trade</span>
            </button>
            <button class="flex flex-col items-center gap-1 p-2 text-slate-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="text-[10px]">History</span>
            </button>
            <button class="flex flex-col items-center gap-1 p-2 text-slate-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                <span class="text-[10px]">Messages</span>
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gicamioeiitrfwhtvqxv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpY2FtaW9laWl0cmZ3aHR2cXh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NDc3NzEsImV4cCI6MjA5NjQyMzc3MX0.YD0A85STez01eTGi5szOlKmY2DwdZev_-3KVxUuoz8U';
        const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let currentSymbol = 'XAUUSD';
        let currentLot = 0.5;
        let balance = 8292.99;
        let tradingViewWidget = null;

        // Initialize
        async function init() {
            const { data: { session } } = await mySupabase.auth.getSession();
            if (!session) {
                window.location.href = 'sign-in.html';
                return;
            }
            currentUser = session.user;
            
            // Load user balance
            const { data: profile } = await mySupabase.from('users').select('balance').eq('id', currentUser.id).single();
            if (profile) {
                balance = profile.balance || 8292.99;
                document.getElementById('balance').textContent = balance.toFixed(2);
            }
            
            initTradingView();
            startPriceUpdates();
        }

        function initTradingView() {
            tradingViewWidget = new TradingView.widget({
                autosize: true,
                symbol: currentSymbol,
                interval: "15",
                timezone: "Etc/UTC",
                theme: "dark",
                style: "1",
                locale: "en",
                toolbar_bg: "#1e222d",
                enable_publishing: false,
                allow_symbol_change: true,
                container_id: "tradingview_chart",
                hide_side_toolbar: false,
                details: true,
                hotlist: true,
                calendar: false,
                studies: [
                    "MASimple@tv-basicstudies",
                    "RSI@tv-basicstudies"
                ],
                show_popup_button: true,
                popup_width: "1000",
                popup_height: "650"
            });
        }

        function startPriceUpdates() {
            // Simulate real-time price updates
            setInterval(() => {
                const basePrice = 4156.50;
                const variation = (Math.random() - 0.5) * 2;
                const currentPrice = basePrice + variation;
                const spread = 0.17;
                
                const sellPrice = currentPrice - (spread / 2);
                const buyPrice = currentPrice + (spread / 2);
                
                // Update prices
                document.getElementById('sellPrice').textContent = sellPrice.toFixed(2);
                document.getElementById('buyPrice').textContent = buyPrice.toFixed(2);
                document.getElementById('sellBtnPrice').textContent = sellPrice.toFixed(2);
                document.getElementById('buyBtnPrice').textContent = buyPrice.toFixed(2);
                document.getElementById('currentPrice').textContent = currentPrice.toFixed(2);
                
                // Update time
                const now = new Date();
                const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
                document.getElementById('priceTime').textContent = timeStr;
                
                // Calculate margin
                const margin = (currentPrice * currentLot) / 100;
                document.getElementById('margin').textContent = margin.toFixed(2);
                
            }, 1000);
        }

        function openTrade(type) {
            const sellPrice = parseFloat(document.getElementById('sellPrice').textContent);
            const buyPrice = parseFloat(document.getElementById('buyPrice').textContent);
            
            const tradeData = {
                user_id: currentUser.id,
                type: type,
                symbol: currentSymbol,
                lot_size: currentLot,
                open_price: type === 'SELL' ? sellPrice : buyPrice,
                stop_loss: 0,
                take_profit: 0,
                status: 'open',
                opened_at: new Date().toISOString()
            };
            
            // Save trade to database
            mySupabase.from('trades').insert(tradeData).then(({ error }) => {
                if (error) {
                    alert('Error opening trade: ' + error.message);
                } else {
                    alert(`Trade opened successfully!\n\nType: ${type}\nSymbol: ${currentSymbol}\nLot: ${currentLot}\nPrice: ${type === 'SELL' ? sellPrice.toFixed(2) : buyPrice.toFixed(2)}`);
                }
            });
        }

        // Lot size selection
        document.querySelectorAll('.bg-slate-800.rounded').forEach(btn => {
            btn.addEventListener('click', function() {
                const lot = parseFloat(this.textContent);
                if (!isNaN(lot)) {
                    currentLot = lot;
                    // Update UI
                    document.querySelectorAll('.bg-slate-800.rounded').forEach(b => {
                        b.classList.remove('bg-blue-600');
                        b.classList.add('bg-slate-800');
                    });
                    this.classList.remove('bg-slate-800');
                    this.classList.add('bg-blue-600');
                    
                    // Recalculate margin
                    const currentPrice = parseFloat(document.getElementById('currentPrice').textContent);
                    const margin = (currentPrice * currentLot) / 100;
                    document.getElementById('margin').textContent = margin.toFixed(2);
                }
            });
        });

        init();
    </script>
</body>
</html>
