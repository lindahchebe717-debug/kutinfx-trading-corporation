<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - KutinFX Trading Corporation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .gold-gradient { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .glass-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(245, 158, 11, 0.15);
        }
        .sidebar { background: rgba(15, 23, 42, 0.95); }
        .nav-item { transition: all 0.3s ease; }
        .nav-item:hover, .nav-item.active { background: rgba(245, 158, 11, 0.15); border-right: 3px solid #f59e0b; color: white; }
        .input-dark { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(245, 158, 11, 0.3); transition: all 0.3s ease; }
        .input-dark:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1); outline: none; }
    </style>
</head>
<body class="gradient-bg min-h-screen text-slate-200">
    <div class="flex min-h-screen">
        <!-- Desktop Sidebar -->
        <aside class="sidebar w-64 fixed h-full hidden lg:block border-r border-slate-700/50 z-20">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-white">
                    <span class="text-amber-500">KutinFX</span>
                </h1>
                <p class="text-slate-500 text-xs mt-1 tracking-wider">TRADING CORPORATION</p>
            </div>
            <nav class="mt-6 space-y-1">
                <a href="dashboard.html" class="nav-item flex items-center px-6 py-3 text-slate-400 hover:text-white">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    Dashboard
                </a>
                <a href="deposit.html" class="nav-item flex items-center px-6 py-3 text-slate-400 hover:text-white">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Deposit
                </a>
                <a href="withdraw.html" class="nav-item flex items-center px-6 py-3 text-slate-400 hover:text-white">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                    Withdraw
                </a>
                <a href="transactions.html" class="nav-item flex items-center px-6 py-3 text-slate-400 hover:text-white">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    Transactions
                </a>
                <a href="kyc.html" class="nav-item flex items-center px-6 py-3 text-slate-400 hover:text-white">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"/></svg>
                    KYC Verification
                </a>
                <a href="profile.html" class="nav-item active flex items-center px-6 py-3 text-white">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    Edit Profile
                </a>
            </nav>
            <div class="absolute bottom-0 w-full p-4 border-t border-slate-700/50">
                <button onclick="logout()" class="w-full flex items-center px-4 py-3 text-red-400 hover:text-red-300 hover:bg-red-500/10 rounded-xl transition-all">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 lg:ml-64 w-full">
            <header class="glass-card sticky top-0 z-10 px-6 py-4 flex items-center justify-between border-b border-slate-700/50">
                <div>
                    <h2 class="text-xl font-semibold text-white">Edit Profile</h2>
                    <p class="text-slate-400 text-sm">Update your account information</p>
                </div>
                <div class="w-10 h-10 rounded-full gold-gradient flex items-center justify-center text-white font-bold shadow-lg" id="userAvatar">U</div>
            </header>

            <div class="p-4 md:p-8 max-w-3xl mx-auto">
                <!-- Success/Error Messages -->
                <div id="successMsg" class="hidden mb-6 p-4 bg-green-500/20 border border-green-500/50 rounded-xl text-green-300 text-center"></div>
                <div id="errorMsg" class="hidden mb-6 p-4 bg-red-500/20 border border-red-500/50 rounded-xl text-red-300 text-center"></div>

                <!-- Profile Information -->
                <div class="glass-card rounded-2xl p-8 shadow-2xl mb-6">
                    <h3 class="text-xl font-bold text-white mb-6">Personal Information</h3>
                    
                    <form id="profileForm" class="space-y-5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-2">First Name</label>
                                <input type="text" id="firstName" required class="input-dark w-full px-4 py-3 rounded-xl text-white placeholder-slate-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-300 mb-2">Last Name</label>
                                <input type="text" id="lastName" required class="input-dark w-full px-4 py-3 rounded-xl text-white placeholder-slate-500">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                            <input type="email" id="email" disabled class="input-dark w-full px-4 py-3 rounded-xl text-slate-400 cursor-not-allowed opacity-60">
                            <p class="text-xs text-slate-500 mt-1">Email cannot be changed for security reasons</p>
                        </div>

                        <button type="submit" id="updateBtn" class="w-full gold-gradient text-white font-semibold py-3 rounded-xl hover:opacity-90 transition-all duration-300 shadow-lg flex items-center justify-center">
                            <span id="updateText">Update Profile</span>
                            <svg id="updateSpinner" class="hidden animate-spin ml-2 w-5 h-5" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </form>
                </div>

                <!-- Change Password -->
                <div class="glass-card rounded-2xl p-8 shadow-2xl">
                    <h3 class="text-xl font-bold text-white mb-6">Change Password</h3>
                    
                    <form id="passwordForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">Current Password</label>
                            <input type="password" id="currentPassword" required class="input-dark w-full px-4 py-3 rounded-xl text-white placeholder-slate-500" placeholder="Enter current password">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">New Password</label>
                            <input type="password" id="newPassword" required minlength="6" class="input-dark w-full px-4 py-3 rounded-xl text-white placeholder-slate-500" placeholder="Min. 6 characters">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-2">Confirm New Password</label>
                            <input type="password" id="confirmNewPassword" required class="input-dark w-full px-4 py-3 rounded-xl text-white placeholder-slate-500" placeholder="Re-enter new password">
                        </div>

                        <button type="submit" id="passwordBtn" class="w-full gold-gradient text-white font-semibold py-3 rounded-xl hover:opacity-90 transition-all duration-300 shadow-lg flex items-center justify-center">
                            <span id="passwordText">Change Password</span>
                            <svg id="passwordSpinner" class="hidden animate-spin ml-2 w-5 h-5" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://gicamioeiitrfwhtvqxv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpY2FtaW9laWl0cmZ3aHR2cXh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NDc3NzEsImV4cCI6MjA5NjQyMzc3MX0.YD0A85STez01eTGi5szOlKmY2DwdZev_-3KVxUuoz8U';
        const mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;

        async function init() {
            const { data: { session } } = await mySupabase.auth.getSession();
            if (!session) {
                window.location.href = 'sign-in.html';
                return;
            }
            currentUser = session.user;
            document.getElementById('userAvatar').textContent = (currentUser.email[0] || 'U').toUpperCase();
            document.getElementById('email').value = currentUser.email;
            
            // Load profile data
            const { data: profile } = await mySupabase.from('users').select('first_name, last_name').eq('id', currentUser.id).single();
            
            if (profile) {
                document.getElementById('firstName').value = profile.first_name || '';
                document.getElementById('lastName').value = profile.last_name || '';
            }
        }
        init();

        // Update Profile
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();

            setLoading('update', true);
            hideMessages();

            try {
                const { error } = await mySupabase
                    .from('users')
                    .update({
                        first_name: firstName,
                        last_name: lastName,
                        full_name: `${firstName} ${lastName}`
                    })
                    .eq('id', currentUser.id);

                if (error) throw error;

                showSuccess('Profile updated successfully!');
            } catch (err) {
                console.error('Profile update error:', err);
                showError('Failed to update profile. Please try again.');
            } finally {
                setLoading('update', false);
            }
        });

        // Change Password
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;

            if (newPassword !== confirmNewPassword) {
                showError('New passwords do not match!');
                return;
            }

            if (newPassword.length < 6) {
                showError('New password must be at least 6 characters!');
                return;
            }

            setLoading('password', true);
            hideMessages();

            try {
                // Verify current password by attempting to sign in
                const { error: verifyError } = await mySupabase.auth.signInWithPassword({
                    email: currentUser.email,
                    password: currentPassword
                });

                if (verifyError) {
                    showError('Current password is incorrect!');
                    setLoading('password', false);
                    return;
                }

                // Sign out the verification session
                await mySupabase.auth.signOut();

                // Update password
                const { error: updateError } = await mySupabase.auth.updateUser({
                    password: newPassword
                });

                if (updateError) throw updateError;

                showSuccess('Password changed successfully! Please sign in again.');
                document.getElementById('passwordForm').reset();
                
                setTimeout(() => {
                    window.location.href = 'sign-in.html';
                }, 2000);
            } catch (err) {
                console.error('Password change error:', err);
                showError('Failed to change password. Please try again.');
            } finally {
                setLoading('password', false);
            }
        });

        function setLoading(type, isLoading) {
            const btn = document.getElementById(type === 'update' ? 'updateBtn' : 'passwordBtn');
            const text = document.getElementById(type === 'update' ? 'updateText' : 'passwordText');
            const spinner = document.getElementById(type === 'update' ? 'updateSpinner' : 'passwordSpinner');
            
            if (isLoading) {
                text.textContent = 'Processing...';
                spinner.classList.remove('hidden');
                btn.disabled = true;
                btn.classList.add('opacity-75', 'cursor-not-allowed');
            } else {
                text.textContent = type === 'update' ? 'Update Profile' : 'Change Password';
                spinner.classList.add('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function hideMessages() {
            document.getElementById('successMsg').classList.add('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
        }

        async function logout() {
            await mySupabase.auth.signOut();
            window.location.href = 'sign-in.html';
        }
    </script>
</body>
</html>
