<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Funds - KutinFX Trading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .gold-gradient { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .glass-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(245, 158, 11, 0.15); }
        .input-dark { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(245, 158, 11, 0.3); transition: all 0.3s ease; }
        .input-dark:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1); outline: none; }
        .crypto-option { transition: all 0.2s ease; cursor: pointer; border: 1px solid rgba(245, 158, 11, 0.2); }
        .crypto-option:hover { border-color: #f59e0b; background: rgba(245, 158, 11, 0.05); transform: translateY(-2px); }
        .crypto-option.selected { border-color: #f59e0b; background: rgba(245, 158, 11, 0.15); box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2); }
        .crypto-option.selected:hover { transform: translateY(0); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-lg">
        <!-- Header -->
        <div class="text-center mb-6">
            <a href="dashboard.html" class="text-slate-400 hover:text-amber-500 flex items-center justify-center gap-2 mb-4 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Back to Dashboard
            </a>
            <h1 class="text-3xl font-bold text-white"><span class="text-amber-500">Deposit</span> Funds</h1>
            <p class="text-slate-400 mt-2">Fund your trading account securely</p>
        </div>

        <!-- Balance Card -->
        <div class="glass-card rounded-2xl p-6 mb-6 text-center">
            <p class="text-slate-400 text-sm mb-1">Current Account Balance</p>
            <h2 class="text-4xl font-bold text-white" id="currentBalance">$0.00</h2>
        </div>

        <!-- Deposit Form -->
        <div class="glass-card rounded-2xl p-6 shadow-2xl">
            <form id="depositForm" class="space-y-5">
                <!-- Amount -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Deposit Amount (USD)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">$</span>
                        <input type="number" id="amount" required min="10" step="0.01"
                            class="input-dark w-full pl-8 pr-4 py-3 rounded-xl text-white placeholder-slate-500"
                            placeholder="0.00">
                    </div>
                    <p class="text-xs text-slate-500 mt-1">Minimum deposit: $10.00</p>
                </div>

                <!-- Payment Method -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-3">Select Payment Method</label>
                    <div class="grid grid-cols-3 gap-3" id="cryptoOptions">
                        <div class="crypto-option selected rounded-xl p-3 text-center" data-method="USDT (TRC20)" data-address="TXYZ1234567890abcdef1234567890abcdef">
                            <div class="text-2xl mb-1">💲</div>
                            <div class="text-white text-sm font-medium">USDT</div>
                            <div class="text-slate-500 text-xs">TRC20</div>
                        </div>
                        <div class="crypto-option rounded-xl p-3 text-center" data-method="Bitcoin (BTC)" data-address="bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh">
                            <div class="text-2xl mb-1">₿</div>
                            <div class="text-white text-sm font-medium">BTC</div>
                            <div class="text-slate-500 text-xs">Network</div>
                        </div>
                        <div class="crypto-option rounded-xl p-3 text-center" data-method="Ethereum (ETH)" data-address="0x71C7656EC7ab88b098defB751B7401B5f6d8976F">
                            <div class="text-2xl mb-1">Ξ</div>
                            <div class="text-white text-sm font-medium">ETH</div>
                            <div class="text-slate-500 text-xs">ERC20</div>
                        </div>
                    </div>
                </div>

                <!-- Wallet Address Display -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Send funds to this address</label>
                    <div class="flex gap-2">
                        <input type="text" id="walletAddress" readonly
                            class="input-dark w-full px-4 py-3 rounded-xl text-slate-300 text-sm font-mono cursor-not-allowed"
                            value="TXYZ1234567890abcdef1234567890abcdef">
                        <button type="button" onclick="copyAddress()" class="gold-gradient text-white px-4 rounded-xl hover:opacity-90 transition-all flex items-center justify-center" title="Copy Address">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                        </button>
                    </div>
                    <input type="hidden" id="selectedMethod" value="USDT (TRC20)">
                </div>

                <!-- Transaction Hash -->
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Transaction Hash / ID <span class="text-slate-500">(Optional but recommended)</span></label>
                    <input type="text" id="txHash"
                        class="input-dark w-full px-4 py-3 rounded-xl text-white placeholder-slate-500"
                        placeholder="Paste transaction hash after sending">
                </div>

                <!-- Messages -->
                <div id="errorMsg" class="hidden p-3 bg-red-500/20 border border-red-500/50 rounded-xl text-red-300 text-sm text-center"></div>
                <div id="successMsg" class="hidden p-3 bg-green-500/20 border border-green-500/50 rounded-xl text-green-300 text-sm text-center"></div>

                <!-- Submit Button -->
                <button type="submit" id="depositBtn" class="w-full gold-gradient text-white font-semibold py-3 rounded-xl hover:opacity-90 transition-all duration-300 shadow-lg flex items-center justify-center">
                    <span id="btnText">Submit Deposit Request</span>
                    <svg id="btnSpinner" class="hidden animate-spin ml-2 w-5 h-5" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
        </div>
        
        <p class="text-center text-slate-500 text-xs mt-6">
            ⚠️ Only send funds on the selected network. Sending to the wrong network may result in permanent loss.
        </p>
    </div>

    <script>
        const SUPABASE_URL = 'https://gicamioeiitrfwhtvqxv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpY2FtaW9laWl0cmZ3aHR2cXh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NDc3NzEsImV4cCI6MjA5NjQyMzc3MX0.YD0A85STez01eTGi5szOlKmY2DwdZev_-3KVxUuoz8U';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;

        // Auth Check & Load Balance
        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = session.user;
            
            const { data: profile } = await supabase.from('users').select('balance').eq('id', currentUser.id).single();
            if (profile) {
                document.getElementById('currentBalance').textContent = `$${(profile.balance || 0).toFixed(2)}`;
            }

            // Initialize crypto selection after DOM is ready
            initializeCryptoSelection();
        }

        // Crypto Selection Logic - Fixed Version
        function initializeCryptoSelection() {
            console.log('Initializing crypto selection...');
            
            const cryptoOptions = document.querySelectorAll('.crypto-option');
            console.log(`Found ${cryptoOptions.length} crypto options`);
            
            cryptoOptions.forEach((option, index) => {
                console.log(`Setting up option ${index}:`, option.dataset.method);
                
                option.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    console.log('Crypto option clicked:', this.dataset.method);
                    
                    // Remove selected class from all options
                    cryptoOptions.forEach(o => {
                        o.classList.remove('selected');
                    });
                    
                    // Add selected class to clicked option
                    this.classList.add('selected');
                    
                    // Update wallet address
                    const newAddress = this.dataset.address;
                    const newMethod = this.dataset.method;
                    
                    console.log('Updating address to:', newAddress);
                    console.log('Updating method to:', newMethod);
                    
                    document.getElementById('walletAddress').value = newAddress;
                    document.getElementById('selectedMethod').value = newMethod;
                    
                    // Visual feedback
                    const addressInput = document.getElementById('walletAddress');
                    addressInput.style.borderColor = '#f59e0b';
                    setTimeout(() => {
                        addressInput.style.borderColor = '';
                    }, 500);
                });
            });
        }

        // Copy Address
        function copyAddress() {
            const address = document.getElementById('walletAddress').value;
            navigator.clipboard.writeText(address).then(() => {
                const btn = document.querySelector('button[onclick="copyAddress()"]');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
                setTimeout(() => btn.innerHTML = originalHTML, 2000);
            });
        }

        // Form Submission
        document.getElementById('depositForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const method = document.getElementById('selectedMethod').value;
            const address = document.getElementById('walletAddress').value;
            const txHash = document.getElementById('txHash').value.trim();

            if (amount < 10) {
                document.getElementById('errorMsg').textContent = 'Minimum deposit amount is $10.00';
                document.getElementById('errorMsg').classList.remove('hidden');
                return;
            }

            setLoading(true);
            document.getElementById('errorMsg').classList.add('hidden');
            document.getElementById('successMsg').classList.add('hidden');

            try {
                const { error } = await supabase.from('transactions').insert([{
                    user_id: currentUser.id,
                    type: 'deposit',
                    amount: amount,
                    payment_method: method,
                    wallet_address: address,
                    transaction_hash: txHash || null,
                    status: 'pending'
                }]);

                if (error) throw error;

                document.getElementById('successMsg').textContent = 'Deposit request submitted successfully! Our team will verify your transaction shortly.';
                document.getElementById('successMsg').classList.remove('hidden');
                document.getElementById('depositForm').reset();
                
                // Reset to default crypto
                document.querySelectorAll('.crypto-option')[0].click();

                setTimeout(() => window.location.href = 'dashboard.html', 3000);
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'Failed to submit deposit request. Please try again.';
                document.getElementById('errorMsg').classList.remove('hidden');
                console.error(err);
            } finally {
                setLoading(false);
            }
        });

        function setLoading(loading) {
            const btn = document.getElementById('depositBtn');
            const text = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            if (loading) {
                text.textContent = 'Processing...';
                spinner.classList.remove('hidden');
                btn.disabled = true;
                btn.classList.add('opacity-75', 'cursor-not-allowed');
            } else {
                text.textContent = 'Submit Deposit Request';
                spinner.classList.add('hidden');
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
