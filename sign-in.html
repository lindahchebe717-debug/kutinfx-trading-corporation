<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - KutinFX Trading Corporation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
        .gold-gradient { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
        .glass-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(245, 158, 11, 0.2); }
        .input-dark { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(245, 158, 11, 0.3); transition: all 0.3s ease; }
        .input-dark:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1); outline: none; }
        
        /* SHAKE ANIMATION FOR ERRORS */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }
        .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2"><span class="text-amber-500">KutinFX</span> Trading</h1>
            <p class="text-slate-400">Access your trading dashboard</p>
        </div>

        <!-- Login Card -->
        <div id="loginCard" class="glass-card rounded-2xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-6 text-center">Welcome Back</h2>
            
            <!-- HUGE ERROR MESSAGE -->
            <div id="errorMsg" class="hidden mb-5 p-4 bg-red-500/20 border-2 border-red-500 rounded-xl text-red-200 text-center font-medium shadow-lg"></div>
            
            <!-- SUCCESS MESSAGE -->
            <div id="successMsg" class="hidden mb-5 p-4 bg-green-500/20 border-2 border-green-500 rounded-xl text-green-200 text-center font-medium"></div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                    <input type="email" id="email" required
                        class="input-dark w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 outline-none"
                        placeholder="your@email.com">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input type="password" id="password" required
                        class="input-dark w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 outline-none"
                        placeholder="Enter your password">
                </div>

                <button type="submit" id="loginBtn"
                    class="w-full gold-gradient text-white font-semibold py-3 rounded-xl hover:opacity-90 transition-all duration-300 shadow-lg flex items-center justify-center">
                    <span id="loginText">Sign In</span>
                    <svg id="loginSpinner" class="hidden animate-spin ml-2 w-5 h-5" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-slate-400">Don't have an account? 
                    <a href="signup.html" class="text-amber-500 font-semibold hover:text-amber-400">Sign Up</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gicamioeiitrfwhtvqxv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpY2FtaW9laWl0cmZ3aHR2cXh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NDc3NzEsImV4cCI6MjA5NjQyMzc3MX0.YD0A85STez01eTGi5szOlKmY2DwdZev_-3KVxUuoz8U';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginForm = document.getElementById('loginForm');
        const loginCard = document.getElementById('loginCard');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const loginText = document.getElementById('loginText');
        const loginSpinner = document.getElementById('loginSpinner');
        const loginBtn = document.getElementById('loginBtn');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
            successMsg.classList.add('hidden');
            // Trigger shake animation
            loginCard.classList.add('animate-shake', 'border-red-500/50');
            setTimeout(() => loginCard.classList.remove('animate-shake'), 500);
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.classList.remove('hidden');
            errorMsg.classList.add('hidden');
        }

        function setLoading(loading) {
            if (loading) {
                loginText.textContent = 'Signing In...';
                loginSpinner.classList.remove('hidden');
                loginBtn.disabled = true;
                loginBtn.classList.add('opacity-75', 'cursor-not-allowed');
            } else {
                loginText.textContent = 'Sign In';
                loginSpinner.classList.add('hidden');
                loginBtn.disabled = false;
                loginBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }
        checkAuth();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            setLoading(true);
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');
            loginCard.classList.remove('border-red-500/50');

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });

                if (error) {
                    showError(error.message); // This will now shake the screen!
                } else {
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                }
            } catch (err) {
                console.error('Login error:', err);
                showError('An unexpected error occurred. Please try again.');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
