<script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://gicamioeiitrfwhtvqxv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpY2FtaW9laWl0cmZ3aHR2cXh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NDc3NzEsImV4cCI6MjA5NjQyMzc3MX0.YD0A85STez01eTGi5szOlKmY2DwdZev_-3KVxUuoz8U';
    
    // We use window.mySupabase to prevent the "already declared" crash
    window.mySupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const loginText = document.getElementById('loginText');
    const loginSpinner = document.getElementById('loginSpinner');
    const loginBtn = document.getElementById('loginBtn');

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.remove('hidden');
        successMsg.classList.add('hidden');
    }

    function showSuccess(msg) {
        successMsg.textContent = msg;
        successMsg.classList.remove('hidden');
        errorMsg.classList.add('hidden');
    }

    function setLoading(loading) {
        if (loading) {
            loginText.textContent = 'Signing In...';
            loginSpinner.classList.remove('hidden');
            loginBtn.disabled = true;
            loginBtn.classList.add('opacity-75', 'cursor-not-allowed');
        } else {
            loginText.textContent = 'Sign In';
            loginSpinner.classList.add('hidden');
            loginBtn.disabled = false;
            loginBtn.classList.remove('opacity-75', 'cursor-not-allowed');
        }
    }

    // Check if already logged in
    async function checkAuth() {
        const { data: { session } } = await window.mySupabase.auth.getSession();
        if (session) {
            window.location.href = 'dashboard.html';
        }
    }
    checkAuth();

    // Handle Sign In Button Click
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        setLoading(true);
        errorMsg.classList.add('hidden');
        successMsg.classList.add('hidden');

        try {
            const { data, error } = await window.mySupabase.auth.signInWithPassword({ 
                email: email, 
                password: password 
            });

            if (error) {
                // If password is wrong or email not confirmed, it will show here!
                showError('❌ ' + error.message);
            } else {
                showSuccess('✅ Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        } catch (err) {
            console.error('Login error:', err);
            showError('An unexpected error occurred.');
        } finally {
            setLoading(false);
        }
    });
</script>
